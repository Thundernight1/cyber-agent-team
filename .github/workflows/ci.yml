name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint
      run: |
        flake8 agents core tools orchestrator cli dashboard --max-line-length=127 --ignore=E203,E402,W291,W293
        black --check agents core tools orchestrator cli dashboard || true
        isort --check agents core tools orchestrator cli dashboard || true

    - name: Test
      run: |
        pytest tests/ -v --cov=core --cov=tools --cov=orchestrator --cov-report=xml

    - name: Security
      run: |
        bandit -r agents core tools orchestrator -s B101 || true
