name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # SonarQube requires full repo history for accurate analysis
        
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Set up Environment & Dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run Tests & Security Checks
      run: |
        source venv/bin/activate
        
        # We explicitly add coverage XML generation for SonarQube
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
        
        # Run local checks smoothly
        make lint
        make security
        
    - name: SonarQube Analysis
      if: ${{ secrets.SONAR_TOKEN != '' }}
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      with:
        args: >
          -Dsonar.projectKey=cyber-agent-team
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.sources=core,agents,tools,orchestrator
          -Dsonar.tests=tests
