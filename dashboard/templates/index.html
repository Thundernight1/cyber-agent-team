<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Agent Team - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">Cyber Agent Dashboard</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-400">Reports</a>
                <a href="#" class="hover:text-blue-400">Agents</a>
                <a href="#" class="hover:text-blue-400">Settings</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Reports List -->
            <div class="md:col-span-1 bg-gray-800 p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Recent Reports</h2>
                <div id="reports-list" class="space-y-4 max-h-[600px] overflow-y-auto">
                    <!-- Reports will be loaded here -->
                    <p class="text-gray-400 italic text-sm">Loading reports...</p>
                </div>
            </div>

            <!-- Report Detail -->
            <div class="md:col-span-2 bg-gray-800 p-6 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Report Detail</h2>
                <div id="report-content" class="text-gray-300">
                    <p class="italic">Select a report from the list to view details.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
         }

        async function loadReports() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();
                const list = document.getElementById('reports-list');
                
                if (reports.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 italic">No reports found.</p>';
                    return;
                }

                list.innerHTML = reports.map(report => `
                    <div onclick="loadReport('${escapeHtml(report.id)}')" class="p-3 bg-gray-700 rounded hover:bg-gray-600 cursor-pointer transition">
                        <div class="flex justify-between items-start">
                            <span class="font-medium text-blue-400">${escapeHtml(report.type.toUpperCase())}</span>
                            <span class="text-xs text-gray-500">${new Date(report.timestamp).toLocaleString()}</span>
                        </div>
                        <p class="text-sm mt-1 truncate">${escapeHtml(report.summary)}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading reports:', error);
                document.getElementById('reports-list').innerHTML = '<p class="text-red-500">Failed to load reports.</p>';
            }
        }

        async function loadReport(id) {
            try {
                const response = await fetch(`/api/report/${id}`);
                const report = await response.json();
                const content = document.getElementById('report-content');
                
                if (report.error) {
                    content.innerHTML = `<p class="text-red-500">${escapeHtml(report.error)}</p>`;
                    return;
                }

                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="text-2xl font-bold text-blue-400">${escapeHtml(report.type.toUpperCase())}</h3>
                            <span class="text-gray-500">${new Date(report.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="bg-gray-900 p-4 rounded border border-gray-700 font-mono text-sm overflow-x-auto">
                            <pre>${escapeHtml(JSON.stringify(report, null, 2))}</pre>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading report detail:', error);
                document.getElementById('report-content').innerHTML = '<p class="text-red-500">Failed to load report details.</p>';
            }
        }

        loadReports();
    </script>
</body>
</html>
